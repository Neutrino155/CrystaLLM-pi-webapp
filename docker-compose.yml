services:
  webapp:
    build: .
    container_name: crystallm-pi-webapp
    ports:
      - "8050:8050"
    environment:
      PORT: 8050
      CRYSTALLM_PI_API_URL: ${CRYSTALLM_PI_API_URL:-http://host.docker.internal:8000}
      CRYSTALLM_PI_SHARED_DATA_DIR: /app/data
      CRYSTALLM_PI_SHARED_OUTPUTS_DIR: /app/outputs
      RATE_LIMIT_STORAGE_URI: redis://redis:6379/0
      RATE_LIMIT_RULE: ${RATE_LIMIT_RULE:-5/minute;30/hour;100/day}
      APP_LOG_PATH: /app/logs/app_logs.log
    volumes:
      - ${WEBAPP_SHARED_DATA_HOST_DIR:-./data}:/app/data
      - ${WEBAPP_SHARED_OUTPUTS_HOST_DIR:-./outputs}:/app/outputs
      - ./logs:/app/logs
    depends_on:
      redis:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: crystallm-pi-redis
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  redis_data:
